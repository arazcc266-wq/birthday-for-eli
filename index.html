<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>❤️ Happy Birthday Eli ❤️</title>

    <meta name="theme-color" content="#ff4d8d">
    <meta name="description" content="A Special Birthday Gift For Eli">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ========================= -->
<!-- LOADING SCREEN -->
<!-- ========================= -->

<div id="loading">

    <div class="loading-content">

        <div class="heart-loader"></div>

        <h1>ARAZ ❤️ Eli</h1>

        <p>
            چاوەڕێ بکە...
            دیارییەکی تایبەت ئامادە دەبێت...
        </p>

        <div class="loading-bar">

            <div id="loading-progress"></div>

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- BACKGROUND -->
<!-- ========================= -->

<div id="stars"></div>

<div id="hearts"></div>

<div id="flowers"></div>

<div id="particles"></div>

<!-- ========================= -->
<!-- HERO -->
<!-- ========================= -->

<section id="hero">

    <div class="glass-card">

        <span class="top-title">
            HAPPY BIRTHDAY
        </span>

        <h1>

            Eli

        </h1>

        <h2>

            ❤️

        </h2>

        <p>

            بەخێربێیت...
            ئەم وێبسایتە تەنها بۆ تۆ دروست کراوە.

        </p>

        <button id="startButton">

            دەستپێبکە ❤️

        </button>

    </div>

</section>

<!-- JS -->

<script src="script.js"></script>

</body>
</html>
